<!doctype html>
<html lang="zh-Hant">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>DST Cooking Recipe</title>
		<meta
			name="description"
			content="Don't Starve Together Crock Pot ingredient reverse lookup."
		>
		<link rel="icon" href="favicon.svg" type="image/svg+xml">
		<link rel="stylesheet" href="styles.css?v=20260705b">
		<script src="app.js?v=20260705b" defer></script>
	</head>
	<body>
		<header class="site-header">
			<a class="brand" href="./" aria-label="DST Cooking Recipe">
				<svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true">
					<path d="M18 24h28l-3 25H21z" class="pot-body"></path>
					<path d="M15 23c4-5 30-5 34 0" class="pot-rim"></path>
					<path d="M21 20c0-5 6-8 11-8s11 3 11 8" class="pot-handle"></path>
					<circle cx="25" cy="33" r="3" class="ingredient-one"></circle>
					<circle cx="36" cy="32" r="4" class="ingredient-two"></circle>
					<circle cx="31" cy="41" r="3" class="ingredient-three"></circle>
				</svg>
				<span>DST Cooking Recipe</span>
			</a>
		</header>

		<main class="app-shell">
			<section class="search-pane" aria-label="食材搜尋">
				<div class="control-row">
					<label class="field-label" for="ingredient-search">食材</label>
					<input
						id="ingredient-search"
						type="search"
						autocomplete="off"
						placeholder="搜尋食材 / ingredient"
					>
				</div>
				<div class="filter-group">
					<div class="filter-label">取得地</div>
					<div class="category-tabs" id="ingredient-origins" role="tablist" aria-label="取得地分類"></div>
				</div>
				<div class="filter-group">
					<div class="filter-label">種類</div>
					<div class="category-tabs" id="ingredient-categories" role="tablist" aria-label="食材分類"></div>
				</div>
				<div class="control-row compact">
					<label class="switch">
						<input id="include-warly" type="checkbox">
						<span>包含 Warly</span>
					</label>
					<label class="sort-control" for="recipe-sort">
						<span>排序</span>
						<select id="recipe-sort">
							<option value="name">名稱</option>
							<option value="hunger">飽食度</option>
							<option value="health">回血量</option>
							<option value="sanity">理智值</option>
							<option value="priority">遊戲優先級</option>
						</select>
					</label>
				</div>
				<button id="clear-selection" class="secondary-action" type="button">清除選取</button>
				<div class="stat-line" id="dataset-status">載入資料中</div>
				<div class="ingredient-list" id="ingredient-list" role="listbox" aria-label="食材清單"></div>
			</section>

			<section class="result-pane" aria-live="polite">
				<div class="result-heading">
					<div class="selection-panel">
						<p class="eyebrow">Cooking Pot</p>
						<h1 id="ingredient-name">-</h1>
						<div class="selected-list" id="selected-ingredients"></div>
						<div class="tag-list" id="ingredient-tags"></div>
					</div>
					<div class="result-count" id="result-count">0 recipes</div>
				</div>
				<div class="stat-sort-toolbar" id="stat-sort-controls" aria-label="狀態排序">
					<button class="stat-sort-button is-reset" type="button" data-stat-sort="reset">
						<span class="stat-sort-letter" aria-hidden="true">A</span>
					</button>
					<button class="stat-sort-button" type="button" data-stat-sort="health">
						<img class="stat-sort-icon" src="assets/status-health.png?v=20260705b" alt="">
						<span class="stat-sort-arrow" aria-hidden="true">↕</span>
					</button>
					<button class="stat-sort-button" type="button" data-stat-sort="hunger">
						<img class="stat-sort-icon" src="assets/status-hunger.png?v=20260705b" alt="">
						<span class="stat-sort-arrow" aria-hidden="true">↕</span>
					</button>
					<button class="stat-sort-button" type="button" data-stat-sort="sanity">
						<img class="stat-sort-icon" src="assets/status-sanity.png?v=20260705b" alt="">
						<span class="stat-sort-arrow" aria-hidden="true">↕</span>
					</button>
				</div>
				<div class="recipe-grid" id="recipe-grid"></div>
			</section>
		</main>

		<template id="ingredient-template">
			<div class="ingredient-option" role="option" tabindex="0">
				<span class="ingredient-thumb"></span>
				<span class="ingredient-option-text">
					<span class="ingredient-option-name"></span>
					<span class="ingredient-option-subtitle"></span>
				</span>
				<span class="ingredient-option-actions">
					<span class="ingredient-option-count"></span>
					<span class="ingredient-stepper" hidden>
						<button class="ingredient-qty-button ingredient-decrease" type="button">-</button>
						<span class="ingredient-selected-count"></span>
						<button class="ingredient-qty-button ingredient-increase" type="button">+</button>
					</span>
				</span>
			</div>
		</template>

		<template id="recipe-template">
			<article class="recipe-card">
				<div class="recipe-art"></div>
				<div class="recipe-card-header">
					<div class="recipe-title">
						<h2></h2>
						<p class="recipe-subtitle"></p>
					</div>
					<span class="badge"></span>
				</div>
				<div class="recipe-stats"></div>
				<div class="recipe-meta"></div>
				<div class="recipe-requirements"></div>
				<div class="match-row"></div>
			</article>
		</template>
	</body>
</html>
